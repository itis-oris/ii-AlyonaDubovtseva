services:
  postgres:
    image: postgres:16
    container_name: subscribio-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - subscribio-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: subscribio-redis
    ports:
      - "6379:6379"

  payment-service:
    build:
      context: ./subscribio-payment-service
      dockerfile: Dockerfile
    container_name: subscribio-payment-service
    ports:
      - "8081:8081"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subscribio-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - payment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

volumes:
  subscribio-postgres-data: