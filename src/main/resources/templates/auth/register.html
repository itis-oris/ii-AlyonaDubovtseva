<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — Subscribio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-card">
    <h1>Регистрация</h1>
    <form method="post" th:action="@{/auth/register}" th:object="${registerForm}">
        <div>
            <label>Имя</label>
            <input type="text" th:field="*{fullName}">
            <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
        </div>
        <div>
            <label>Email</label>
            <input type="email" th:field="*{email}">
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div>
            <label>Пароль</label>
            <input type="password" th:field="*{password}">
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div>
            <label>Повторите пароль</label>
            <input type="password" th:field="*{confirmPassword}">
            <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>
        <button type="submit">Создать аккаунт</button>
    </form>
<a th:href="@{/auth/login}">Уже есть аккаунт</a>
</div>
</body>
</html>
