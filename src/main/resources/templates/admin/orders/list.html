<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка — заказы</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="header">
    <a class="logo" th:href="@{/admin/products}">Subscribio Admin</a>
    <a th:href="@{/admin/products}">Товары</a>
    <a th:href="@{/admin/orders}">Заказы пользователей</a>
    <a th:href="@{/catalog}">Каталог</a>
</header>

<div class="container">
    <h1>Все заказы</h1>
    <div class="success" th:if="${success}" th:text="${success}"></div>
    <div class="error" th:if="${error}" th:text="${error}"></div>

    <div th:if="${orders.isEmpty()}" class="card">
        Заказов пока нет.
    </div>
    <table th:if="${!orders.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Номер</th>
            <th>Пользователь</th>
            <th>Email</th>
            <th>Дата</th>
            <th>Статус</th>
            <th>Сумма</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.orderNumber}"></td>
            <td th:text="${order.user.fullName}"></td>
            <td th:text="${order.user.email}"></td>
            <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
            <td th:text="${@orderStatusText.convert(order.status)}"></td>
            <td>
                <a class="btn btn-secondary"
                   th:href="@{/admin/orders/{id}(id=${order.id})}">
                    Открыть
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
