<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка — товары</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a class="logo" th:href="@{/admin/products}">Subscribio Admin</a>
    <a th:href="@{/admin/products}">Товары</a>
    <a th:href="@{/admin/orders}">Заказы пользователей</a>
    <a th:href="@{/catalog}">Каталог</a>
</nav>

<div class="container">
    <h1>Управление подписками</h1>
    <a class="btn" th:href="@{/admin/products/new}">Добавить подписку</a>
    <a class="btn btn-secondary" th:href="@{/admin/products/ordered}">
        Уже покупали
    </a>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Категория</th>
            <th>Цена</th>
            <th>Активен</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.title}"></td>
            <td th:text="${product.category != null ? product.category.name : '-'}"></td>
            <td th:text="${product.priceRub}"></td>
            <td th:text="${product.active}"></td>
            <td>
                <a th:href="@{/admin/products/{id}/edit(id=${product.id})}">Редактировать</a>
                <form method="post"
                      th:action="@{/admin/products/{id}/delete(id=${product.id})}"
                      style="display:inline">
                    <button type="submit">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
