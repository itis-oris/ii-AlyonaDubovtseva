<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ошибка — Subscribio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="header">
    <a class="logo" th:href="@{/catalog}">Subscribio</a>
    <a th:href="@{/catalog}">Каталог</a>
</header>

<div class="container">
    <div class="card">
        <h1 th:text="${title}">Ошибка</h1>
        <p>
            Код ошибки:
            <strong th:text="${status}"></strong>
        </p>
        <p th:text="${message}">
            Что-то пошло не так.
        </p>
        <a class="btn" th:href="@{/catalog}">
            Вернуться в каталог
        </a>
    </div>
</div>

</body>
</html>
